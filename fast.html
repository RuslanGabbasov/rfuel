            });

            var heat = L.heatLayer(heatData, {
                radius: 30,
                blur: 2,
                maxZoom: 10,
                max: 1,
                gradient: {
                    0.0: "#ff1744",
                    0.2: "#ff9100",
                    0.5: "#ffd600",
                    0.8: "#00c853",
                    1.0: "#00c853",
                },
            }).addTo(map);

                var lat = e.latlng.lat;
                var lng = e.latlng.lng;
                var closest = null,
                    minDist = Infinity;
                points.forEach(function (p) {
                    var d = Math.hypot(p.lat - lat, p.lon - lng);
                    if (d < minDist) {
                        minDist = d;
                        closest = p;
                    }
                });
                if (closest && minDist < 4) {
                    var sc =
                        closest.availability_score >= 80
                            ? "color:#00c853"
                            : closest.availability_score >= 50
                              ? "color:#ffd600"
                              : closest.availability_score >= 20
                                ? "color:#ff9100"
                                : "color:#ff1744";
                    L.popup()
                        .setLatLng([closest.lat, closest.lon])
                        .setContent(

                                closest.lat.toFixed(2) +
                                ", " +

                                "<br>" +
                                "&#10060; Нет: " +

                                sc +
                                ';font-weight:bold;font-size:16px">' +
                                closest.availability_score +
                                "%</span>",
                        )
                        .openOn(map);
                }
            });

            if (points.length > 0) {

                    return [p.lat, p.lon];
                });
